name: votrr
description: "A secure biometric voting application prototype."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Navigation
  go_router: ^14.6.1

  # Biometrics & Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^10.1.2

  # Face Detection
  google_mlkit_face_detection: ^0.11.0
  camera: ^0.11.0+2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.0
  gap: ^3.0.1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1

  # Code Generation Annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generators
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env