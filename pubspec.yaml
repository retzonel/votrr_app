name: votrr
description: A biometric-enabled voting application prototype.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Biometrics & Device
  local_auth: ^2.3.0
  device_info_plus: ^10.0.0  
  flutter_secure_storage: ^9.2.2  # encrypted local storage


  # Media & Images
  cloudinary_flutter: ^1.3.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  dio: ^5.4.0

  # Animations
  flutter_animate: ^4.5.0

  # Code generation support
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

   # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
